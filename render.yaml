services:
  - type: web
    name: app-pedidos-negocio
    runtime: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_USERNAME
        value: admin
      - key: APP_PASSWORD
        value: gpfSmiguel
      - key: SESSION_SECRET
        generateValue: true
      - key: ORDERS_DB_PATH
        value: /var/data/orders.db
    disk:
      name: pedidos-data
      mountPath: /var/data
      sizeGB: 1
