<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingreso - App Pedidos</title>
  <meta name="theme-color" content="#7d1821" />
  <meta name="description" content="App interna de Guanacopan Francés para agenda diaria y pedidos de compra." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Guanacopan Francés" />
  <meta property="og:description" content="Agenda diaria y pedidos de compra de Guanacopan Francés." />
  <meta property="og:image" content="{{ request.url_for('static', path='logo-gpf-512.png') }}" />
  <meta property="og:url" content="{{ request.url }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Guanacopan Francés" />
  <meta name="twitter:description" content="Agenda diaria y pedidos de compra de Guanacopan Francés." />
  <meta name="twitter:image" content="{{ request.url_for('static', path='logo-gpf-512.png') }}" />
  <link rel="icon" type="image/png" href="/static/logo-gpf.png" />
  <link rel="apple-touch-icon" href="/static/logo-gpf-192.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="login-screen">
  <main class="login-shell">
    <section class="login-card glass-card">
      <div class="avatar-wrap">
        <div class="avatar-circle">
          <img src="/static/logo-gpf.jpg" alt="Logo Guanacopan Francés" class="avatar-logo" />
        </div>
      </div>

      {% if error %}
        <p class="login-error">{{ error }}</p>
      {% endif %}

      <form method="post" action="/login" class="login-form">
        <label class="line-field">
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="3" y="5" width="18" height="14" rx="2"></rect>
              <path d="M3 7l9 6 9-6"></path>
            </svg>
          </span>
          <input name="username" type="text" placeholder="Usuario" required autocomplete="username" />
        </label>

        <label class="line-field password-field">
          <span class="field-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8">
              <rect x="5" y="10" width="14" height="10" rx="2"></rect>
              <path d="M8 10V7a4 4 0 1 1 8 0v3"></path>
            </svg>
          </span>
          <input id="passwordInput" name="password" type="password" placeholder="Contraseña" required autocomplete="current-password" />
          <button type="button" id="togglePasswordBtn" class="toggle-password" aria-label="Mostrar contraseña">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" aria-hidden="true">
              <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
          </button>
        </label>

        <div class="login-row">
          <label class="remember-wrap">
            <input type="checkbox" />
            <span>Recordarme</span>
          </label>
          <span class="forgot-text">¿Olvidaste tu contraseña?</span>
        </div>

        <button type="submit" class="login-btn">INICIAR SESIÓN</button>
      </form>

    </section>
  </main>
  <script>
    const passwordInput = document.getElementById("passwordInput");
    const togglePasswordBtn = document.getElementById("togglePasswordBtn");
    if (passwordInput && togglePasswordBtn) {
      togglePasswordBtn.addEventListener("click", () => {
        const showing = passwordInput.type === "text";
        passwordInput.type = showing ? "password" : "text";
        togglePasswordBtn.setAttribute("aria-label", showing ? "Mostrar contraseña" : "Ocultar contraseña");
      });
    }
  </script>
</body>
</html>
