<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pedidos de Clientes</title>
  <meta name="theme-color" content="#7d1821" />
  <meta name="description" content="Pedidos de clientes recibidos por WhatsApp en Guanacopan Francés." />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Pedidos de Clientes - Guanacopan Francés" />
  <meta property="og:description" content="Revisa pedidos de clientes recibidos por WhatsApp." />
  <meta property="og:image" content="{{ request.url_for('static', path='logo-gpf-512.png') }}" />
  <meta property="og:url" content="{{ request.url }}" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Pedidos de Clientes - Guanacopan Francés" />
  <meta name="twitter:description" content="Revisa pedidos de clientes recibidos por WhatsApp." />
  <meta name="twitter:image" content="{{ request.url_for('static', path='logo-gpf-512.png') }}" />
  <link rel="icon" type="image/png" href="/static/logo-gpf.png" />
  <link rel="apple-touch-icon" href="/static/logo-gpf-192.png" />
  <link rel="manifest" href="/static/site.webmanifest" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main class="page customer-orders-page">
    <header class="topbar panel">
      <div>
        <p class="eyebrow">GPF WhatsApp</p>
        <h1>Pedidos de Clientes</h1>
      </div>
      <div class="topbar-right">
        <button type="button" id="refreshCustomerOrdersBtn" class="ghost-btn">Actualizar</button>
        <a href="/app" class="ghost-btn topbar-link-btn">Inicio</a>
        <form method="post" action="/logout">
          <button type="submit" class="ghost-btn">Cerrar sesión</button>
        </form>
      </div>
    </header>

    <section class="customer-orders-layout">
      <article class="panel customer-orders-list-panel">
        <div class="customer-orders-head">
          <h2>Historial reciente</h2>
          <span id="customerOrdersCount" class="badge">0 pedidos</span>
        </div>
        <div id="customerOrdersList" class="customer-orders-list"></div>
      </article>

      <article class="panel customer-order-detail-panel">
        <div class="customer-orders-head">
          <h2>Detalle</h2>
          <span id="customerOrderStatus" class="badge">Sin selección</span>
        </div>
        <div id="customerOrderDetail" class="customer-order-detail">
          <p class="muted">Selecciona un pedido para ver productos, cantidades y total.</p>
        </div>
      </article>
    </section>
  </main>

  <div id="flash" class="flash"></div>
  <script src="/static/customer_orders.js" defer></script>
</body>
</html>
